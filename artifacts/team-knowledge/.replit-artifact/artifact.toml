kind = "web"
previewPath = "/"
title = "TeamKnowledge"
version = "1.0.0"
id = "artifacts/team-knowledge"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18956

[services.development]
run = "pnpm --filter @workspace/team-knowledge run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/team-knowledge", "run", "build" ]
publicDir = "artifacts/team-knowledge/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18956"
BASE_PATH = "/"
